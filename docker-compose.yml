services:

  # ========================================
  # PostgreSQL
  # ========================================

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_pass

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # PgAdmin
  # ========================================

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

  # ========================================
  # Angular Frontend
  # ========================================

  frontend:
    build:
      context: ./frontend/cafefinance

    container_name: angular_frontend

    restart: always

    environment:
      # Garante que o Angular CLI está no PATH
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/app/node_modules/.bin

    ports:
      - "4200:4200"

    volumes:
      - ./frontend/cafefinance:/app
      - frontend_node_modules:/app/node_modules

    command: npm start

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========================================
  # PHP API
  # ========================================

  php-api:
    build:
      context: ./php-api/cafefinance-php

    container_name: php_api

    restart: always

    volumes:
      - ./php-api/cafefinance-php/public:/var/www/html

    expose:
      - "80"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========================================
  # Python API
  # ========================================

  python-api:
    build:
      context: ./python-api/cafefinance-python

    container_name: python_api

    restart: always

    volumes:
      - ./python-api/cafefinance-python:/app

    expose:
      - "8000"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========================================
  # Nginx Proxy
  # ========================================

  nginx:
    image: nginx:stable

    container_name: nginx_proxy

    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      frontend:
        condition: service_healthy

      php-api:
        condition: service_healthy

      python-api:
        condition: service_healthy

volumes:
  postgres_data:
  frontend_node_modules: